<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DGM Survey Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=IBM+Plex+Sans+Thai:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
:root {
  --red:    #C8102E;
  --yellow: #FFE140;
  --navy:   #1B3A57;
  --navy2:  #112840;
  --white:  #F8F6F1;
  --gray:   #D4CFC6;
  --gray2:  #9A9590;
  --bg:     #0F1E2E;
  --card:   #162536;
  --card2:  #1D3045;
  --border: rgba(255,255,255,0.07);
  --green:  #22C55E;
  --orange: #F59E0B;
  --mono:   'IBM Plex Mono', monospace;
  --sans:   'IBM Plex Sans Thai', sans-serif;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:var(--sans);background:var(--bg);color:var(--white);min-height:100vh;}

/* ── LOGIN ── */
#loginScreen{position:fixed;inset:0;z-index:9999;background:var(--bg);display:flex;align-items:center;justify-content:center;}
.login-box{background:var(--card);border:1px solid var(--border);border-top:3px solid var(--red);padding:44px 36px 36px;width:340px;border-radius:6px;}
.login-logo{display:flex;align-items:center;gap:12px;margin-bottom:28px;}
.login-logo .badge{width:36px;height:36px;background:var(--red);display:flex;align-items:center;justify-content:center;border-radius:6px;font-size:16px;}
.login-title{font-size:15px;font-weight:700;color:var(--white);line-height:1.3;}
.login-sub{font-size:11px;color:var(--gray2);margin-top:2px;}
.login-label{font-size:11px;color:var(--gray2);text-transform:uppercase;letter-spacing:.06em;margin-bottom:6px;display:block;}
.login-input{width:100%;background:var(--card2);border:1px solid var(--border);border-radius:6px;padding:11px 14px;color:var(--white);font-size:14px;font-family:var(--sans);outline:none;transition:border .15s;}
.login-input:focus{border-color:var(--red);}
.login-btn{width:100%;margin-top:18px;padding:12px;background:var(--red);color:#fff;border:none;border-radius:6px;font-size:14px;font-weight:600;cursor:pointer;font-family:var(--sans);letter-spacing:.03em;}
.login-btn:hover{background:#a00d24;}
.login-err{font-size:12px;color:#ff6b6b;margin-top:10px;text-align:center;min-height:18px;}

/* ── SHELL ── */
#appShell{display:none;}
.topbar{background:var(--navy2);border-bottom:2px solid var(--red);padding:0 20px;height:52px;display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:100;}
.topbar .logo{font-weight:700;font-size:14px;color:var(--white);letter-spacing:.03em;}
.topbar .logo span{color:var(--yellow);}
.topbar .sync-info{margin-left:auto;font-size:11px;color:var(--gray2);display:flex;align-items:center;gap:8px;}
.sync-dot{width:7px;height:7px;border-radius:50%;background:#555;}
.sync-dot.live{background:var(--green);animation:pulse 2s infinite;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.sync-btn{background:transparent;border:1px solid var(--border);color:var(--gray2);padding:4px 10px;border-radius:4px;font-size:11px;cursor:pointer;font-family:var(--sans);}
.sync-btn:hover{border-color:var(--gray2);color:var(--white);}
.logout-btn{background:transparent;border:none;color:var(--gray2);font-size:20px;cursor:pointer;padding:4px;}
.logout-btn:hover{color:var(--white);}

/* ── TABS ── */
.tabs{background:var(--card);border-bottom:1px solid var(--border);display:flex;gap:0;padding:0 20px;overflow-x:auto;}
.tab{padding:12px 18px;font-size:13px;color:var(--gray2);cursor:pointer;border-bottom:2px solid transparent;white-space:nowrap;font-weight:500;transition:all .15s;}
.tab:hover{color:var(--white);}
.tab.active{color:var(--yellow);border-bottom-color:var(--yellow);}

/* ── MAIN ── */
.tab-panel{display:none;padding:20px;max-width:1200px;margin:0 auto;}
.tab-panel.active{display:block;}

/* ── KPI CARDS ── */
.kpi-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:12px;margin-bottom:20px;}
.kpi-card{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:16px 14px;}
.kpi-card .kpi-label{font-size:11px;color:var(--gray2);text-transform:uppercase;letter-spacing:.06em;margin-bottom:6px;}
.kpi-card .kpi-val{font-size:28px;font-weight:700;font-family:var(--mono);color:var(--white);}
.kpi-card .kpi-sub{font-size:11px;color:var(--gray2);margin-top:4px;}
.kpi-card.highlight{border-color:var(--yellow);background:rgba(255,225,64,.05);}
.kpi-card.red-highlight{border-color:var(--red);background:rgba(200,16,46,.07);}

/* ── ALERT SECTION ── */
.alert-section{background:var(--card);border:1px solid var(--border);border-radius:8px;margin-bottom:20px;overflow:hidden;}
.alert-header{padding:14px 16px;display:flex;align-items:center;gap:8px;border-bottom:1px solid var(--border);cursor:pointer;user-select:none;}
.alert-header .alert-badge{background:var(--red);color:#fff;border-radius:12px;padding:2px 8px;font-size:11px;font-weight:700;}
.alert-header .alert-title{font-size:13px;font-weight:600;color:var(--white);}
.alert-header .alert-icon{font-size:16px;}
.alert-header .toggle-icon{margin-left:auto;color:var(--gray2);font-size:14px;transition:transform .2s;}
.alert-header.collapsed .toggle-icon{transform:rotate(-90deg);}
.alert-body{padding:0;}
.alert-item{padding:12px 16px;border-bottom:1px solid var(--border);display:grid;grid-template-columns:1fr auto;gap:8px;align-items:start;}
.alert-item:last-child{border-bottom:none;}
.alert-item-name{font-size:13px;font-weight:600;color:var(--white);}
.alert-item-detail{font-size:11px;color:var(--gray2);margin-top:3px;line-height:1.5;}
.alert-item-time{font-size:11px;color:var(--orange);font-family:var(--mono);white-space:nowrap;}
.alert-item-flag{display:inline-block;background:rgba(245,158,11,.15);color:var(--orange);border:1px solid rgba(245,158,11,.3);border-radius:4px;padding:2px 7px;font-size:10px;font-weight:700;}
.alert-empty{padding:20px;text-align:center;color:var(--gray2);font-size:13px;}

/* ── SECTION TITLE ── */
.section-title{font-size:13px;font-weight:600;color:var(--gray2);text-transform:uppercase;letter-spacing:.07em;margin-bottom:12px;display:flex;align-items:center;gap:8px;}
.section-title::after{content:'';flex:1;height:1px;background:var(--border);}

/* ── TABLE ── */
.data-table{width:100%;border-collapse:collapse;font-size:12px;}
.data-table th{background:var(--card2);color:var(--gray2);font-weight:600;text-transform:uppercase;font-size:10px;letter-spacing:.05em;padding:9px 12px;text-align:left;border-bottom:1px solid var(--border);}
.data-table td{padding:10px 12px;border-bottom:1px solid rgba(255,255,255,.04);color:var(--white);}
.data-table tr:hover td{background:rgba(255,255,255,.02);}
.data-table .badge{display:inline-block;padding:2px 8px;border-radius:4px;font-size:10px;font-weight:700;}
.badge-mt{background:rgba(47,120,152,.2);color:#5bc8f5;}
.badge-gt{background:rgba(34,197,94,.1);color:#4ade80;}
.badge-fraud{background:rgba(200,16,46,.2);color:#ff6b6b;}
.badge-clean{background:rgba(34,197,94,.1);color:#4ade80;}

/* ── CHART ── */
.chart-wrap{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:16px;margin-bottom:20px;}
.chart-wrap canvas{max-height:220px;}

/* ── MAP ── */
#mapContainer{height:400px;border-radius:8px;overflow:hidden;border:1px solid var(--border);}

/* ── LOADING ── */
.loading{display:flex;align-items:center;justify-content:center;height:200px;flex-direction:column;gap:12px;color:var(--gray2);font-size:13px;}
.spinner{width:32px;height:32px;border:3px solid var(--border);border-top-color:var(--red);border-radius:50%;animation:spin .8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg)}}

/* ── DATE FILTER ── */
.filter-bar{display:flex;align-items:center;gap:12px;margin-bottom:20px;flex-wrap:wrap;}
.filter-bar label{font-size:12px;color:var(--gray2);}
.filter-bar input[type=date],.filter-bar select{background:var(--card2);border:1px solid var(--border);color:var(--white);padding:7px 10px;border-radius:6px;font-size:12px;font-family:var(--sans);outline:none;}
.filter-bar input[type=date]:focus,.filter-bar select:focus{border-color:var(--red);}
.filter-btn{background:var(--red);color:#fff;border:none;border-radius:6px;padding:8px 16px;font-size:12px;cursor:pointer;font-family:var(--sans);}
.filter-btn:hover{background:#a00d24;}

/* ── RESPONSIVE ── */
@media(max-width:600px){
  .kpi-grid{grid-template-columns:repeat(2,1fr);}
  .topbar .logo{font-size:12px;}
}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="loginScreen">
  <div class="login-box">
    <div class="login-logo">
      <div class="badge">🐔</div>
      <div>
        <div class="login-title">DGM Survey Dashboard</div>
        <div class="login-sub">Ayam Brand · Sales & Marketing</div>
      </div>
    </div>
    <label class="login-label">Mật khẩu</label>
    <input class="login-input" type="password" id="pwInput" placeholder="Nhập mật khẩu..." onkeydown="if(event.key==='Enter')doLogin()">
    <button class="login-btn" onclick="doLogin()">Đăng nhập →</button>
    <div class="login-err" id="loginErr"></div>
  </div>
</div>

<!-- APP -->
<div id="appShell">
  <div class="topbar">
    <div class="logo">DGM <span>DASHBOARD</span></div>
    <div class="sync-info">
      <div class="sync-dot" id="syncDot"></div>
      <span id="syncLabel">Chưa tải</span>
      <button class="sync-btn" onclick="loadData()">↻ Tải lại</button>
      <button class="logout-btn" onclick="doLogout()" title="Đăng xuất">⎋</button>
    </div>
  </div>

  <div class="tabs">
    <div class="tab active" onclick="switchTab('overview')">📊 Tổng quan</div>
    <div class="tab" onclick="switchTab('mt')">🏪 MT</div>
    <div class="tab" onclick="switchTab('gt')">📦 GT</div>
    <div class="tab" onclick="switchTab('map')">🗺️ Bản đồ</div>
    <div class="tab" onclick="switchTab('raw')">📋 Dữ liệu</div>
  </div>

  <!-- OVERVIEW TAB -->
  <div class="tab-panel active" id="tab-overview">
    <div class="filter-bar">
      <label>Từ ngày</label>
      <input type="date" id="filterFrom">
      <label>Đến ngày</label>
      <input type="date" id="filterTo">
      <button class="filter-btn" onclick="applyFilter()">Lọc</button>
      <button class="filter-btn" style="background:var(--card2);color:var(--white)" onclick="setToday()">Hôm nay</button>
    </div>
    <div id="overviewContent">
      <div class="loading"><div class="spinner"></div><span>Đang tải dữ liệu...</span></div>
    </div>
  </div>

  <!-- MT TAB -->
  <div class="tab-panel" id="tab-mt">
    <div id="mtContent">
      <div class="loading"><div class="spinner"></div><span>Đang tải dữ liệu...</span></div>
    </div>
  </div>

  <!-- GT TAB -->
  <div class="tab-panel" id="tab-gt">
    <div id="gtContent">
      <div class="loading"><div class="spinner"></div><span>Đang tải dữ liệu...</span></div>
    </div>
  </div>

  <!-- MAP TAB -->
  <div class="tab-panel" id="tab-map">
    <div class="section-title">Vị trí khảo sát GPS</div>
    <div id="mapContainer"></div>
  </div>

  <!-- RAW TAB -->
  <div class="tab-panel" id="tab-raw">
    <div id="rawContent">
      <div class="loading"><div class="spinner"></div><span>Đang tải dữ liệu...</span></div>
    </div>
  </div>
</div>

<script>
// ── CONFIG ─────────────────────────────────────────────────
// TODO: Thay bằng URL Apps Script doGet() của bạn
const SCRIPT_URL = localStorage.getItem('dgm_dash_url') || '';
const PASSWORD = '2026';

let rawMT = [], rawGT = [], filtered = { mt: [], gt: [] };
let mapInstance = null;

// ── AUTH ────────────────────────────────────────────────────
function doLogin() {
  const v = document.getElementById('pwInput').value.trim();
  if (v === PASSWORD) {
    document.getElementById('loginScreen').style.display = 'none';
    document.getElementById('appShell').style.display = 'block';
    initDateFilter();
    loadData();
  } else {
    document.getElementById('loginErr').textContent = '❌ Mật khẩu không đúng';
    setTimeout(() => document.getElementById('loginErr').textContent = '', 2000);
  }
}
function doLogout() {
  document.getElementById('loginScreen').style.display = 'flex';
  document.getElementById('appShell').style.display = 'none';
  document.getElementById('pwInput').value = '';
}

// ── DATE FILTER ─────────────────────────────────────────────
function initDateFilter() {
  const today = new Date().toISOString().slice(0,10);
  document.getElementById('filterFrom').value = today;
  document.getElementById('filterTo').value = today;
}
function setToday() {
  initDateFilter();
  applyFilter();
}
function applyFilter() {
  const from = document.getElementById('filterFrom').value;
  const to   = document.getElementById('filterTo').value;
  filtered.mt = rawMT.filter(r => r.date >= from && r.date <= to);
  filtered.gt = rawGT.filter(r => r.date >= from && r.date <= to);
  renderOverview();
  renderMT();
  renderGT();
  renderRaw();
}

// ── DATA LOAD ───────────────────────────────────────────────
async function loadData() {
  setSyncState('loading');
  if (!SCRIPT_URL) {
    const url = prompt('Nhập URL Apps Script Web App:');
    if (url) { localStorage.setItem('dgm_dash_url', url); location.reload(); }
    return;
  }
  try {
    const [rMT, rGT] = await Promise.all([
      fetch(SCRIPT_URL + '?action=getData&sheet=MT_Survey_Data').then(r=>r.json()),
      fetch(SCRIPT_URL + '?action=getData&sheet=GT_Survey_Data').then(r=>r.json())
    ]);
    rawMT = (rMT.data || rMT.records || []);
    rawGT = (rGT.data || rGT.records || []);
    setSyncState('live');
    applyFilter();
  } catch(e) {
    console.error(e);
    setSyncState('error');
    renderFallback();
  }
}

function setSyncState(s) {
  const dot = document.getElementById('syncDot');
  const lbl = document.getElementById('syncLabel');
  if (s === 'live') { dot.className='sync-dot live'; lbl.textContent='Live · '+new Date().toLocaleTimeString('vi-VN'); }
  else if (s === 'loading') { dot.className='sync-dot'; lbl.textContent='Đang tải...'; }
  else { dot.className='sync-dot'; lbl.style.color='#ff6b6b'; lbl.textContent='Lỗi kết nối'; }
}
function renderFallback() {
  ['overviewContent','mtContent','gtContent','rawContent'].forEach(id => {
    document.getElementById(id).innerHTML = '<div class="loading" style="height:120px"><span style="color:#ff6b6b">⚠️ Không thể tải dữ liệu. Kiểm tra URL Apps Script.</span></div>';
  });
}

// ── FRAUD ALERTS ─────────────────────────────────────────────
function getFraudAlerts(records) {
  return records.filter(r =>
    r.fraud_flag === 'SUSPICIOUS' || r.fraud_flag === 'SUSPECT' ||
    (r.conflict_with && r.conflict_with.trim() !== '')
  );
}

function renderFraudSection(mtRecords, gtRecords) {
  const allFraud = [...getFraudAlerts(mtRecords), ...getFraudAlerts(gtRecords)]
    .sort((a,b) => (b.timestamp||'') > (a.timestamp||'') ? 1 : -1);

  const badge = allFraud.length > 0
    ? `<span class="alert-badge">${allFraud.length}</span>`
    : `<span style="font-size:11px;color:var(--green);margin-left:4px">✅ Không có cảnh báo</span>`;

  const items = allFraud.length === 0
    ? `<div class="alert-empty">✅ Tất cả báo cáo trong kỳ này đều sạch — không có cảnh báo thiết bị.</div>`
    : allFraud.map(r => `
        <div class="alert-item">
          <div>
            <div class="alert-item-name">⚠️ ${esc(r.salesperson || '—')}</div>
            <div class="alert-item-detail">
              📱 Thiết bị cũng được dùng bởi: <b style="color:#fbbf24">${esc(r.conflict_with || '—')}</b><br>
              🏪 ${esc(r.store_name || r.outlet || r.customer || '—')} &nbsp;·&nbsp;
              🏷️ ${r.channel || '—'} &nbsp;·&nbsp; ${r.team || '—'}<br>
              🕐 Xung đột lúc: ${r.conflict_time || '—'}
            </div>
          </div>
          <div>
            <div class="alert-item-time">${(r.date||'')}</div>
            <div class="alert-item-flag">SUSPICIOUS</div>
          </div>
        </div>`).join('');

  return `
    <div class="alert-section" id="fraudSection">
      <div class="alert-header" onclick="toggleAlerts()">
        <span class="alert-icon">🚨</span>
        <span class="alert-title">Cảnh báo thiết bị trùng lặp (Fraud Alert)</span>
        ${badge}
        <span class="toggle-icon">▼</span>
      </div>
      <div class="alert-body" id="alertBody">${items}</div>
    </div>`;
}

function toggleAlerts() {
  const h = document.querySelector('.alert-header');
  const b = document.getElementById('alertBody');
  if (b.style.display === 'none') { b.style.display = ''; h.classList.remove('collapsed'); }
  else { b.style.display = 'none'; h.classList.add('collapsed'); }
}

// ── OVERVIEW RENDER ──────────────────────────────────────────
function renderOverview() {
  const mt = filtered.mt, gt = filtered.gt;
  const all = [...mt, ...gt];
  const totalSubmissions = all.length;
  const uniqueStaff = new Set(all.map(r=>r.salesperson).filter(Boolean)).size;
  const uniqueStores = new Set(all.map(r=>r.store_name||r.outlet||r.customer).filter(Boolean)).size;
  const fraudCount = getFraudAlerts(all).length;

  const byTeam = {};
  all.forEach(r => { byTeam[r.team||'—'] = (byTeam[r.team||'—']||0)+1; });
  const teamRows = Object.entries(byTeam).sort((a,b)=>b[1]-a[1])
    .map(([t,c]) => `<tr><td>${esc(t)}</td><td style="font-family:var(--mono);text-align:right">${c}</td></tr>`).join('');

  const byDate = {};
  all.forEach(r => { if(r.date) byDate[r.date] = (byDate[r.date]||0)+1; });
  const dates = Object.keys(byDate).sort();
  const chartId = 'chartDaily_' + Date.now();

  document.getElementById('overviewContent').innerHTML = `
    <div class="kpi-grid">
      <div class="kpi-card"><div class="kpi-label">Tổng báo cáo</div><div class="kpi-val">${totalSubmissions}</div><div class="kpi-sub">MT + GT</div></div>
      <div class="kpi-card"><div class="kpi-label">MT</div><div class="kpi-val">${mt.length}</div><div class="kpi-sub">Modern Trade</div></div>
      <div class="kpi-card"><div class="kpi-label">GT</div><div class="kpi-val">${gt.length}</div><div class="kpi-sub">General Trade</div></div>
      <div class="kpi-card"><div class="kpi-label">Nhân viên</div><div class="kpi-val">${uniqueStaff}</div><div class="kpi-sub">có báo cáo</div></div>
      <div class="kpi-card"><div class="kpi-label">Điểm bán</div><div class="kpi-val">${uniqueStores}</div><div class="kpi-sub">được khảo sát</div></div>
      <div class="kpi-card ${fraudCount>0?'red-highlight':''}"><div class="kpi-label">Cảnh báo</div><div class="kpi-val" style="color:${fraudCount>0?'var(--red)':'var(--green)'}">${fraudCount}</div><div class="kpi-sub">thiết bị trùng</div></div>
    </div>

    ${renderFraudSection(mt, gt)}

    <div class="section-title">Theo kênh & khu vực</div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:20px">
      <div class="chart-wrap">
        <div style="font-size:12px;color:var(--gray2);margin-bottom:10px">Theo nhóm / kênh</div>
        <table class="data-table">${teamRows}</table>
      </div>
      <div class="chart-wrap">
        <div style="font-size:12px;color:var(--gray2);margin-bottom:10px">Xu hướng theo ngày</div>
        <canvas id="${chartId}"></canvas>
      </div>
    </div>`;

  // Chart
  setTimeout(() => {
    const ctx = document.getElementById(chartId);
    if (!ctx || !dates.length) return;
    new Chart(ctx, {
      type: 'bar',
      data: {
        labels: dates,
        datasets: [{
          label: 'Báo cáo',
          data: dates.map(d => byDate[d]),
          backgroundColor: 'rgba(200,16,46,0.7)',
          borderColor: 'var(--red)',
          borderWidth: 1,
          borderRadius: 3
        }]
      },
      options: {
        responsive: true, maintainAspectRatio: true,
        plugins: { legend: { display: false } },
        scales: {
          x: { ticks: { color: '#9A9590', font: { size: 10 } }, grid: { color: 'rgba(255,255,255,.04)' } },
          y: { ticks: { color: '#9A9590', font: { size: 10 } }, grid: { color: 'rgba(255,255,255,.04)' }, beginAtZero: true }
        }
      }
    });
  }, 50);
}

// ── MT RENDER ────────────────────────────────────────────────
function renderMT() {
  const data = filtered.mt;
  if (!data.length) { document.getElementById('mtContent').innerHTML = '<div class="loading" style="height:120px"><span>Không có dữ liệu MT trong kỳ này</span></div>'; return; }
  const byStaff = {};
  data.forEach(r => { byStaff[r.salesperson||'—'] = (byStaff[r.salesperson||'—']||0)+1; });
  const staffRows = Object.entries(byStaff).sort((a,b)=>b[1]-a[1])
    .map(([n,c]) => `<tr><td>${esc(n)}</td><td><span class="badge badge-mt">MT</span></td><td style="font-family:var(--mono)">${c}</td></tr>`).join('');
  document.getElementById('mtContent').innerHTML = `
    <div class="section-title">Nhân viên MT</div>
    <div class="chart-wrap">
      <table class="data-table">
        <thead><tr><th>Nhân viên</th><th>Kênh</th><th>Số báo cáo</th></tr></thead>
        <tbody>${staffRows}</tbody>
      </table>
    </div>
    <div class="section-title">Chi tiết gần đây</div>
    <div class="chart-wrap" style="overflow-x:auto">
      ${renderDetailTable(data.slice(-30).reverse())}
    </div>`;
}

// ── GT RENDER ────────────────────────────────────────────────
function renderGT() {
  const data = filtered.gt;
  if (!data.length) { document.getElementById('gtContent').innerHTML = '<div class="loading" style="height:120px"><span>Không có dữ liệu GT trong kỳ này</span></div>'; return; }
  const byRegion = {};
  data.forEach(r => { byRegion[r.region||r.team||'—'] = (byRegion[r.region||r.team||'—']||0)+1; });
  const regionRows = Object.entries(byRegion).sort((a,b)=>b[1]-a[1])
    .map(([n,c]) => `<tr><td>${esc(n)}</td><td style="font-family:var(--mono)">${c}</td></tr>`).join('');
  document.getElementById('gtContent').innerHTML = `
    <div class="section-title">Theo khu vực GT</div>
    <div class="chart-wrap">
      <table class="data-table">
        <thead><tr><th>Khu vực</th><th>Báo cáo</th></tr></thead>
        <tbody>${regionRows}</tbody>
      </table>
    </div>
    <div class="section-title">Chi tiết gần đây</div>
    <div class="chart-wrap" style="overflow-x:auto">
      ${renderDetailTable(data.slice(-30).reverse())}
    </div>`;
}

function renderDetailTable(rows) {
  if (!rows.length) return '<div style="color:var(--gray2);font-size:12px;padding:10px">Không có dữ liệu</div>';
  const header = `<thead><tr><th>Nhân viên</th><th>Kênh</th><th>Cửa hàng</th><th>Ngày</th><th>Giờ</th><th>GPS</th><th>Fraud</th></tr></thead>`;
  const body = rows.map(r => `
    <tr>
      <td>${esc(r.salesperson||'—')}</td>
      <td><span class="badge ${r.channel==='MT'?'badge-mt':'badge-gt'}">${r.channel||r.team||'—'}</span></td>
      <td>${esc(r.store_name||r.outlet||r.customer||'—')}</td>
      <td style="font-family:var(--mono);white-space:nowrap">${r.date||'—'}</td>
      <td style="font-family:var(--mono);white-space:nowrap">${r.time||'—'}</td>
      <td style="font-size:10px;color:var(--gray2)">${r.lat&&r.lng?r.lat+','+r.lng:r.gps||'—'}</td>
      <td><span class="badge ${(r.fraud_flag==='SUSPICIOUS'||r.fraud_flag==='SUSPECT')?'badge-fraud':'badge-clean'}">${r.fraud_flag||'CLEAN'}</span></td>
    </tr>`).join('');
  return `<table class="data-table">${header}<tbody>${body}</tbody></table>`;
}

// ── RAW RENDER ───────────────────────────────────────────────
function renderRaw() {
  const all = [...filtered.mt, ...filtered.gt].sort((a,b)=>(b.timestamp||'')>(a.timestamp||'')?1:-1);
  document.getElementById('rawContent').innerHTML = `
    <div class="section-title">Tất cả báo cáo (${all.length})</div>
    <div class="chart-wrap" style="overflow-x:auto">${renderDetailTable(all)}</div>`;
}

// ── MAP ──────────────────────────────────────────────────────
function renderMap() {
  if (!mapInstance) {
    mapInstance = L.map('mapContainer').setView([14.0, 108.0], 6);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{attribution:'© OSM'}).addTo(mapInstance);
  }
  mapInstance.eachLayer(l => { if (l instanceof L.CircleMarker) mapInstance.removeLayer(l); });
  const all = [...filtered.mt, ...filtered.gt];
  all.forEach(r => {
    const lat = parseFloat(r.lat || (r.gps ? r.gps.split(/[\s,]+/)[0] : null));
    const lng = parseFloat(r.lng || (r.gps ? r.gps.split(/[\s,]+/)[1] : null));
    if (!lat || !lng || isNaN(lat) || isNaN(lng)) return;
    const isFraud = r.fraud_flag === 'SUSPICIOUS' || r.fraud_flag === 'SUSPECT';
    L.circleMarker([lat, lng], {
      radius: 7, fillColor: isFraud ? '#C8102E' : (r.channel === 'MT' ? '#5bc8f5' : '#4ade80'),
      color: '#fff', weight: 1.5, fillOpacity: .8
    }).bindPopup(`<b>${r.salesperson||'—'}</b><br>${r.store_name||r.outlet||'—'}<br>${r.date||''} ${r.time||''}<br>${isFraud?'⚠️ SUSPICIOUS':''}`).addTo(mapInstance);
  });
}

// ── TABS ─────────────────────────────────────────────────────
function switchTab(id) {
  document.querySelectorAll('.tab-panel').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.getElementById('tab-'+id).classList.add('active');
  event.currentTarget.classList.add('active');
  if (id === 'map') { renderMap(); setTimeout(()=>mapInstance&&mapInstance.invalidateSize(),100); }
}

// ── UTIL ─────────────────────────────────────────────────────
function esc(s){ const d=document.createElement('div');d.textContent=String(s||'');return d.innerHTML; }
</script>
</body>
</html>
